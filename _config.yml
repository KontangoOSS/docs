title: Kontango Docs
description: Open-source platform for running your own cloud on hardware you own.
remote_theme: just-the-docs/just-the-docs

color_scheme: dark

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

aux_links:
  "GitHub":
    - "https://github.com/KontangoOSS/docs"
  "Discord":
    - "https://discord.gg/CrXWJfwD"

aux_links_new_tab: true

search_enabled: true
search:
  heading_level: 2
  previews: 2

heading_anchors: true

footer_content: 'Kontango is open source. Help is available — <a href="mailto:hello@kontango.io">hello@kontango.io</a> or <a href="https://discord.gg/CrXWJfwD">Discord</a>.'

# Make sure Jekyll picks up our content
include:
  - concepts
