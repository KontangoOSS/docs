baseURL = "https://kontangooss.github.io/docs/"
title = "Kontango Docs"
languageCode = "en"
defaultContentLanguage = "en"

# Use the Relearn theme via remote module
theme = ["github.com/McShelby/hugo-theme-relearn"]

# Pretty URLs (no .html)
uglyURLs = false

# Pages without explicit menu config still appear
disableKinds = ["taxonomy", "term"]

[params]
  # Theme — start in dark mode matching the marketing site palette
  themeVariant = "kontango-dark"

  # Edit this page link
  editURL = "https://github.com/KontangoOSS/docs/edit/main/content/"

  # Order sections by weight value in front matter
  ordersectionsby = "weight"

[params.search]
  disable = false

# Top-right buttons (Relearn calls these "menus")
[[menu.shortcuts]]
  name = "<i class='fab fa-github'></i> GitHub"
  url = "https://github.com/KontangoOSS/docs"
  weight = 10

[[menu.shortcuts]]
  name = "<i class='fab fa-discord'></i> Discord"
  url = "https://discord.gg/CrXWJfwD"
  weight = 11

[[menu.shortcuts]]
  name = "<i class='fas fa-globe'></i> kontango.io"
  url = "https://kontangooss.github.io/site/"
  weight = 20

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
